<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    html {
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    :root {
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: #0f172a;
      background: #f1f5f9;
    }

    body {
      margin: 0;
      min-width: 320px;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.1), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: #0f172a;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding: 48px 20px;
    }

    .task-app {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #2563eb;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      line-height: 1.05;
      color: #0f172a;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 560px;
      color: #475569;
      font-size: 1rem;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .stat-card {
      min-width: 130px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(8px);
    }

    .stat-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .stat-card strong {
      font-size: 1.8rem;
      color: #0f172a;
    }

    .panel {
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
      backdrop-filter: blur(10px);
    }

    .task-form {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
    }

    .task-form input {
      flex: 1;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      outline: none;
      transition: all 0.2s ease;
      color: #0f172a;
    }

    .task-form input::placeholder,
    .search-box input::placeholder {
      color: #94a3b8;
    }

    .task-form input:focus,
    .search-box input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .task-form button {
      border: none;
      border-radius: 16px;
      padding: 16px 22px;
      min-width: 130px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .task-form button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.28);
    }

    .task-form button:active {
      transform: translateY(0);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid #dbe3f0;
      background: #f8fafc;
      color: #334155;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-chip span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      margin-left: 8px;
      padding: 0 6px;
      border-radius: 999px;
      background: white;
      color: #2563eb;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .filter-chip:hover {
      transform: translateY(-1px);
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .filter-chip.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
    }

    .filter-chip.active span {
      background: rgba(255, 255, 255, 0.18);
      color: white;
    }

    .search-box {
      min-width: 250px;
      flex: 1;
      display: flex;
      justify-content: flex-end;
    }

    .search-box input {
      width: 100%;
      max-width: 320px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      outline: none;
      transition: all 0.2s ease;
      color: #0f172a;
    }

    .message {
      margin: 0 0 18px;
      font-size: 0.95rem;
      color: #475569;
    }

    .message.error {
      color: #dc2626;
    }

    .result-count {
      margin: 0 0 14px;
      color: #64748b;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .empty-state {
      padding: 36px 20px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      background: #f8fafc;
    }

    .empty-state h3 {
      margin: 0 0 8px;
      color: #0f172a;
    }

    .empty-state p {
      margin: 0;
      color: #64748b;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .task-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .task-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
    }

    .task-card.completed {
      background: #f8fafc;
      border-color: #dbeafe;
    }

    .task-check {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 2px solid #94a3b8;
      background: white;
      color: #2563eb;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-card.completed .task-check {
      border-color: #2563eb;
      background: #dbeafe;
    }

    .task-content {
      flex: 1;
      cursor: pointer;
      outline: none;
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
    }

    .task-card.completed .task-title {
      color: #64748b;
      text-decoration: line-through;
    }

    .task-status {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .task-card.completed .task-status {
      background: #dcfce7;
      color: #15803d;
    }

    .delete-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: #ef4444;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .delete-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 28px 14px;
      }

      .panel {
        padding: 18px;
        border-radius: 20px;
      }

      .task-form {
        flex-direction: column;
      }

      .task-form button {
        width: 100%;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .filters {
        gap: 8px;
      }

      .filter-chip {
        width: 100%;
        justify-content: space-between;
      }

      .search-box {
        min-width: 100%;
      }

      .search-box input {
        max-width: 100%;
      }

      .task-card {
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .delete-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="task-app">
      <div class="hero">
        <div>
          <p class="eyebrow">Productivity app</p>
          <h1>Task Manager</h1>
          <p class="subtitle">
            Organize your work with a clean and simple task dashboard.
          </p>
        </div>

        <div class="stats">
          <div class="stat-card">
            <span class="stat-label">Total</span>
            <strong id="totalCount">0</strong>
          </div>

          <div class="stat-card">
            <span class="stat-label">Completed</span>
            <strong id="completedCount">0</strong>
          </div>

          <div class="stat-card">
            <span class="stat-label">Pending</span>
            <strong id="pendingCount">0</strong>
          </div>
        </div>
      </div>

      <section class="panel">
        <div class="task-form">
          <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task..."
          />
          <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="toolbar">
          <div class="filters">
            <button class="filter-chip active" data-filter="all">
              All <span id="allCount">0</span>
            </button>

            <button class="filter-chip" data-filter="pending">
              Pending <span id="pendingChipCount">0</span>
            </button>

            <button class="filter-chip" data-filter="completed">
              Completed <span id="completedChipCount">0</span>
            </button>
          </div>

          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search tasks..."
            />
          </div>
        </div>

        <p class="message error" id="errorMessage" style="display:none;"></p>
        <p class="message" id="loadingMessage">Loading tasks...</p>
        <p class="result-count" id="resultCount" style="display:none;"></p>

        <div class="empty-state" id="emptyState" style="display:none;">
          <h3>No tasks found</h3>
          <p id="emptyStateText">Add your first task to get started.</p>
        </div>

        <div class="task-list" id="taskList"></div>
      </section>
    </main>
  </div>

  <script>
    let tasks = [];
    let searchTerm = "";
    let filter = "all";

    const taskInput = document.getElementById("taskInput");
    const searchInput = document.getElementById("searchInput");
    const addTaskBtn = document.getElementById("addTaskBtn");
    const taskList = document.getElementById("taskList");
    const errorMessage = document.getElementById("errorMessage");
    const loadingMessage = document.getElementById("loadingMessage");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");
    const emptyStateText = document.getElementById("emptyStateText");

    const totalCount = document.getElementById("totalCount");
    const completedCount = document.getElementById("completedCount");
    const pendingCount = document.getElementById("pendingCount");
    const allCount = document.getElementById("allCount");
    const pendingChipCount = document.getElementById("pendingChipCount");
    const completedChipCount = document.getElementById("completedChipCount");

    function setError(message) {
      if (message) {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
      } else {
        errorMessage.textContent = "";
        errorMessage.style.display = "none";
      }
    }

    function getFilteredTasks() {
      let result = [...tasks];

      if (filter === "pending") {
        result = result.filter(task => !task.completed);
      } else if (filter === "completed") {
        result = result.filter(task => task.completed);
      }

      if (searchTerm.trim()) {
        result = result.filter(task =>
          task.title.toLowerCase().includes(searchTerm.toLowerCase())
        );
      }

      return result;
    }

    function updateStats() {
      const completed = tasks.filter(task => task.completed).length;
      const pending = tasks.length - completed;

      totalCount.textContent = tasks.length;
      completedCount.textContent = completed;
      pendingCount.textContent = pending;

      allCount.textContent = tasks.length;
      pendingChipCount.textContent = pending;
      completedChipCount.textContent = completed;
    }

    function renderTasks() {
      const filteredTasks = getFilteredTasks();
      const hasError = errorMessage.style.display === "block";

      taskList.innerHTML = "";
      updateStats();

      loadingMessage.style.display = "none";

      if (!hasError) {
        resultCount.style.display = "block";
        resultCount.textContent =
          `Showing ${filteredTasks.length} of ${tasks.length} task${tasks.length !== 1 ? "s" : ""}`;
      } else {
        resultCount.style.display = "none";
      }

      if (!hasError && filteredTasks.length === 0) {
        emptyState.style.display = "block";

        if (searchTerm.trim()) {
          emptyStateText.textContent = `No tasks match "${searchTerm}".`;
        } else if (filter === "all") {
          emptyStateText.textContent = "Add your first task to get started.";
        } else {
          emptyStateText.textContent = `There are no ${filter} tasks right now.`;
        }

        return;
      } else {
        emptyState.style.display = "none";
      }

      filteredTasks.forEach(task => {
        const card = document.createElement("div");
        card.className = `task-card ${task.completed ? "completed" : ""}`;

        const checkBtn = document.createElement("button");
        checkBtn.className = "task-check";
        checkBtn.setAttribute("aria-label", task.completed ? "Mark task as incomplete" : "Mark task as complete");
        checkBtn.textContent = task.completed ? "✓" : "";
        checkBtn.addEventListener("click", () => toggleTask(task));

        const content = document.createElement("div");
        content.className = "task-content";
        content.setAttribute("role", "button");
        content.setAttribute("tabindex", "0");
        content.addEventListener("click", () => toggleTask(task));
        content.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleTask(task);
          }
        });

        const title = document.createElement("p");
        title.className = "task-title";
        title.textContent = task.title;

        const status = document.createElement("span");
        status.className = "task-status";
        status.textContent = task.completed ? "Completed" : "Pending";

        content.appendChild(title);
        content.appendChild(status);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", () => deleteTask(task.id));

        card.appendChild(checkBtn);
        card.appendChild(content);
        card.appendChild(deleteBtn);

        taskList.appendChild(card);
      });
    }

    async function loadTasks() {
      loadingMessage.style.display = "block";
      setError("");

      try {
        const res = await fetch("/api/tasks");
        const data = await res.json();

        if (Array.isArray(data)) {
          tasks = data;
          setError("");
        } else {
          tasks = [];
          setError("Backend did not return a task array");
        }
      } catch (e) {
        tasks = [];
        setError("Could not connect to backend");
      } finally {
        renderTasks();
      }
    }

    async function addTask() {
      const title = taskInput.value.trim();
      if (!title) return;

      try {
        const res = await fetch("/api/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title })
        });

        if (!res.ok) throw new Error("Failed");
        taskInput.value = "";
        setError("");
        loadTasks();
      } catch (e) {
        setError("Failed to add task");
      }
    }

    async function toggleTask(task) {
      try {
        const res = await fetch("/api/tasks", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: task.id,
            completed: !task.completed
          })
        });

        if (!res.ok) throw new Error("Failed");
        setError("");
        loadTasks();
      } catch (e) {
        setError("Failed to update task");
      }
    }

    async function deleteTask(id) {
      try {
        const res = await fetch("/api/tasks", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id })
        });

        if (!res.ok) throw new Error("Failed");
        setError("");
        loadTasks();
      } catch (e) {
        setError("Failed to delete task");
      }
    }

    addTaskBtn.addEventListener("click", addTask);

    taskInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });

    searchInput.addEventListener("input", (e) => {
      searchTerm = e.target.value;
      renderTasks();
    });

    document.querySelectorAll(".filter-chip").forEach((btn) => {
      btn.addEventListener("click", () => {
        filter = btn.dataset.filter;

        document.querySelectorAll(".filter-chip").forEach((chip) => {
          chip.classList.remove("active");
        });

        btn.classList.add("active");
        renderTasks();
      });
    });

    loadTasks();
  </script>
</body>
</html>
